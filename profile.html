<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Rent Me Bangkok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#070709;--bg2:#0f0f12;--bg3:#17171c;
  --fg:#f5f5f5;--muted:#888;
  --red:#e63946;--blue:#2563eb;--blue-l:#60a5fa;
  --border:rgba(255,255,255,.08);
  --border-blue:rgba(37,99,235,.3);
  --border-red:rgba(230,57,70,.3);
  --radius:10px;
  --ease:cubic-bezier(.16,1,.3,1);
  --font-head:'Bebas Neue',sans-serif;
  --font-body:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:var(--font-body);min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:var(--font-body)}
input{font-family:var(--font-body)}

/* NAV */
nav{position:sticky;top:0;z-index:50;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,9,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--font-head);font-size:1.4rem;letter-spacing:.05em}
.nav-logo span{color:var(--red)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-size:13px;color:var(--muted);transition:color .2s}
.nav-link:hover{color:var(--fg)}

/* LAYOUT */
.page{max-width:800px;margin:0 auto;padding:48px 24px 80px}

/* HEADER */
.profile-header{display:flex;align-items:center;gap:24px;margin-bottom:48px;padding:32px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;position:relative;overflow:hidden}
.profile-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--blue))}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:2rem;color:#fff;flex-shrink:0}
.profile-header-info h1{font-family:var(--font-head);font-size:1.8rem;line-height:1;margin-bottom:6px}
.profile-header-info p{font-size:13px;color:var(--muted)}
.header-actions{margin-left:auto;display:flex;gap:10px;flex-shrink:0}

/* SECTIONS */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:24px;overflow:hidden}
.section-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-family:var(--font-head);font-size:1.2rem;letter-spacing:.04em}
.section-body{padding:24px}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
input[type=text],input[type=email],input[type=tel]{
  width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--fg);font-size:14px;transition:border-color .2s;
}
input:focus{outline:none;border-color:var(--blue)}
input:disabled{opacity:.5;cursor:not-allowed}
input::placeholder{color:var(--muted)}

/* BUTTONS */
.btn-primary{background:var(--blue);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{border:1px solid var(--border);color:var(--fg);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;transition:border-color .2s}
.btn-ghost:hover{border-color:rgba(255,255,255,.25)}
.btn-danger{border:1px solid var(--border-red);color:var(--red);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;transition:background .2s}
.btn-danger:hover{background:rgba(230,57,70,.1)}

/* MSG */
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.msg.error{background:rgba(230,57,70,.1);border:1px solid var(--border-red);color:#ff6b6b;display:block}
.msg.success{background:rgba(37,99,235,.1);border:1px solid var(--border-blue);color:var(--blue-l);display:block}

/* BOOKINGS TABLE */
.bookings-list{display:flex;flex-direction:column;gap:12px}
.booking-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;align-items:center;gap:16px;transition:border-color .2s}
.booking-card:hover{border-color:rgba(255,255,255,.15)}
.booking-icon{font-size:1.8rem;flex-shrink:0}
.booking-info{flex:1;min-width:0}
.booking-ref{font-size:11px;font-weight:700;color:var(--blue-l);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.booking-title{font-weight:600;font-size:14px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.booking-meta{font-size:12px;color:var(--muted)}
.status-badge{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.status-confirmed{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:#4ade80}
.status-pending{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24}
.status-cancelled{background:rgba(230,57,70,.1);border:1px solid var(--border-red);color:var(--red)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 24px}
.empty-state-icon{font-size:3rem;margin-bottom:16px;opacity:.5}
.empty-state-title{font-family:var(--font-head);font-size:1.5rem;margin-bottom:8px;color:var(--muted)}
.empty-state-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

/* SPINNER */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABS */
.tabs{display:flex;gap:2px;padding:4px;background:var(--bg3)}
.tab{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:.04em}
.tab.active{background:var(--bg2);color:var(--fg)}
.tab-panel{display:none}
.tab-panel.active{display:block}

@media(max-width:640px){
  nav{padding:12px 16px}
  .page{padding:24px 16px 60px}
  .profile-header{flex-direction:column;align-items:flex-start;gap:16px}
  .header-actions{margin-left:0}
  .form-row{grid-template-columns:1fr}
  .booking-card{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">RENT<span>ME</span> BANGKOK</a>
  <div class="nav-right">
    <a href="booking.html" class="nav-link">Book Now</a>
    <button onclick="doLogout()" class="btn-danger" style="padding:8px 14px;font-size:12px">Log Out</button>
  </div>
</nav>

<div class="page" id="page-wrap" style="display:none">

  <!-- HEADER -->
  <div class="profile-header">
    <div class="avatar" id="avatar-initials">?</div>
    <div class="profile-header-info">
      <h1 id="header-name">Loading…</h1>
      <p id="header-email"></p>
      <p id="header-joined" style="font-size:11px;color:var(--muted);margin-top:4px"></p>
    </div>
    <div class="header-actions">
      <a href="booking.html" class="btn-primary" style="display:inline-block">+ New Booking</a>
    </div>
  </div>

  <!-- PROFILE INFO SECTION -->
  <div class="section">
    <div class="section-head">
      <div class="section-title">PROFILE INFORMATION</div>
      <div style="display:flex;gap:10px">
        <button class="btn-ghost" onclick="changePassword()">Change Password</button>
        <button class="btn-ghost" id="edit-toggle" onclick="toggleEdit()">Edit</button>
      </div>
    </div>
    <div class="section-body">
      <div class="msg" id="profile-msg"></div>
      <form onsubmit="saveProfile(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="p-first">First Name</label>
            <input type="text" id="p-first" disabled>
          </div>
          <div class="form-group">
            <label for="p-last">Last Name</label>
            <input type="text" id="p-last" disabled>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="p-phone">Phone</label>
            <input type="tel" id="p-phone" disabled placeholder="+66 81 234 5678">
          </div>
          <div class="form-group">
            <label for="p-email">Email</label>
            <input type="email" id="p-email" disabled>
          </div>
        </div>
        <div id="save-btn-wrap" style="display:none">
          <button type="submit" class="btn-primary" id="btn-save">Save Changes</button>
          <button type="button" onclick="toggleEdit(true)" class="btn-ghost" style="margin-left:10px">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- BOOKINGS SECTION -->
  <div class="section">
    <div class="section-head">
      <div class="section-title">MY BOOKINGS</div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchBookingTab('upcoming',this)">Upcoming</div>
      <div class="tab" onclick="switchBookingTab('past',this)">Past</div>
      <div class="tab" onclick="switchBookingTab('all',this)">All</div>
    </div>
    <div class="section-body" style="padding:16px">
      <div id="bookings-upcoming" class="tab-panel active">
        <div class="empty-state" id="empty-upcoming" style="display:none">
          <div class="empty-state-icon">📅</div>
          <div class="empty-state-title">No upcoming bookings</div>
          <div class="empty-state-sub">Ready to book your next session?</div>
          <a href="booking.html" class="btn-primary" style="display:inline-block">Book Now</a>
        </div>
        <div class="bookings-list" id="list-upcoming"></div>
      </div>
      <div id="bookings-past" class="tab-panel">
        <div class="empty-state" id="empty-past" style="display:none">
          <div class="empty-state-icon">🗓️</div>
          <div class="empty-state-title">No past bookings yet</div>
          <div class="empty-state-sub">Your booking history will appear here.</div>
        </div>
        <div class="bookings-list" id="list-past"></div>
      </div>
      <div id="bookings-all" class="tab-panel">
        <div class="bookings-list" id="list-all"></div>
      </div>
    </div>
  </div>

</div>

<!-- Loading state -->
<div id="loading-state" style="display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:13px;color:var(--muted)">
  <span class="spinner"></span> Loading your profile…
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://nghsyxwhczvwaorssgoh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5naHN5eHdoY3p2d2FvcnNzZ29oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDA3NDIsImV4cCI6MjA5NzYxNjc0Mn0.3EV00ggHV5domLBbJpTrdIiWatOyhNpFVJo42FqppPk'
);

let currentUser = null;
let allBookings = [];
let isEditing = false;

// ─── AUTH GUARD ───
(async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) {
    location.href = 'auth.html?return=profile.html';
    return;
  }
  currentUser = data.session.user;
  loadProfile();
  loadBookings();
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('page-wrap').style.display = '';
})();

// ─── LOAD PROFILE ───
async function loadProfile() {
  const { data: p } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();

  const first = p?.first_name || '';
  const last  = p?.last_name  || '';
  const phone = p?.phone      || '';
  const email = p?.email      || currentUser.email;

  document.getElementById('p-first').value = first;
  document.getElementById('p-last').value  = last;
  document.getElementById('p-phone').value = phone;
  document.getElementById('p-email').value = email;

  const displayName = [first, last].filter(Boolean).join(' ') || email;
  document.getElementById('header-name').textContent  = displayName;
  document.getElementById('header-email').textContent = email;
  document.getElementById('header-joined').textContent = 'Member since ' + new Date(currentUser.created_at).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  const initials = [(first[0] || ''), (last[0] || '')].filter(Boolean).join('').toUpperCase() || email[0].toUpperCase();
  document.getElementById('avatar-initials').textContent = initials;
}

// ─── EDIT TOGGLE ───
function toggleEdit(cancel = false) {
  isEditing = !isEditing || cancel;
  if (cancel) isEditing = false;

  const inputs = document.querySelectorAll('#p-first,#p-last,#p-phone,#p-email');
  inputs.forEach(i => { i.disabled = !isEditing; });
  document.getElementById('edit-toggle').textContent = isEditing ? '' : 'Edit';
  document.getElementById('edit-toggle').style.display = isEditing ? 'none' : '';
  document.getElementById('save-btn-wrap').style.display = isEditing ? '' : 'none';
  document.getElementById('profile-msg').className = 'msg';

  if (cancel) loadProfile();
}

// ─── SAVE PROFILE ───
async function saveProfile(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  const { error } = await sb.from('profiles').upsert({
    id:         currentUser.id,
    first_name: document.getElementById('p-first').value.trim(),
    last_name:  document.getElementById('p-last').value.trim(),
    phone:      document.getElementById('p-phone').value.trim(),
    email:      document.getElementById('p-email').value.trim()
  });

  btn.disabled = false;
  btn.textContent = 'Save Changes';

  const msgEl = document.getElementById('profile-msg');
  if (error) {
    msgEl.textContent = error.message;
    msgEl.className = 'msg error';
  } else {
    msgEl.textContent = '✓ Profile updated successfully.';
    msgEl.className = 'msg success';
    toggleEdit(true);
    loadProfile();
    setTimeout(() => { msgEl.className = 'msg'; }, 3000);
  }
}

// ─── LOAD BOOKINGS ───
async function loadBookings() {
  // Get bookings by user_id OR by email (guest bookings)
  const email = currentUser.email;

  const [byUserId, byEmail] = await Promise.all([
    sb.from('bookings').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
    sb.from('bookings').select('*').eq('guest_email', email).order('created_at', { ascending: false })
  ]);

  const seen = new Set();
  allBookings = [...(byUserId.data || []), ...(byEmail.data || [])].filter(b => {
    if (seen.has(b.id)) return false;
    seen.add(b.id);
    return true;
  }).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  renderBookings();
}

function renderBookings() {
  const today = new Date().toISOString().split('T')[0];

  const upcoming = allBookings.filter(b => {
    const d = b.booking_date || b.equipment_end_date;
    return d >= today && b.status !== 'cancelled';
  });
  const past = allBookings.filter(b => {
    const d = b.booking_date || b.equipment_end_date;
    return d < today || b.status === 'cancelled';
  });

  renderList('list-upcoming', upcoming, 'empty-upcoming');
  renderList('list-past',     past,     'empty-past');
  renderList('list-all',      allBookings);
}

const SVC_ICONS = { studio_rental: '📸', podcast: '🎙️', equipment: '🚁' };
const SVC_NAMES = { studio_rental: 'Photo Studio Rental', podcast: 'Podcast Session', equipment: 'Equipment Rental' };

function renderList(containerId, bookings, emptyId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  if (emptyId) {
    document.getElementById(emptyId).style.display = bookings.length === 0 ? '' : 'none';
  }

  bookings.forEach(b => {
    const date = b.booking_date
      ? new Date(b.booking_date + 'T12:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
      : b.equipment_start_date
        ? new Date(b.equipment_start_date + 'T12:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' – ' + new Date(b.equipment_end_date + 'T12:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : '—';

    const time = b.start_time ? ` · ${b.start_time}${b.end_time ? ' – ' + b.end_time : ''}` : '';
    const statusClass = 'status-' + (b.status || 'confirmed');

    const card = document.createElement('div');
    card.className = 'booking-card';
    card.innerHTML = `
      <div class="booking-icon">${SVC_ICONS[b.service_type] || '📋'}</div>
      <div class="booking-info">
        <div class="booking-ref">${b.booking_ref}</div>
        <div class="booking-title">${SVC_NAMES[b.service_type] || b.service_type}</div>
        <div class="booking-meta">${date}${time}${b.total_price ? ' · ฿' + Number(b.total_price).toLocaleString() : ''}</div>
      </div>
      <div class="status-badge ${statusClass}">${b.status || 'confirmed'}</div>
    `;
    container.appendChild(card);
  });
}

// ─── TAB SWITCH ───
function switchBookingTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('bookings-' + tab).classList.add('active');
}

// ─── LOGOUT ───
async function doLogout() {
  await sb.auth.signOut();
  location.href = 'index.html';
}

async function changePassword() {
  const pw1 = prompt('Enter your new password (min 6 characters):');
  if (pw1 === null) return;
  if (pw1.length < 6) { alert('Password must be at least 6 characters.'); return; }
  const pw2 = prompt('Confirm your new password:');
  if (pw2 === null) return;
  if (pw1 !== pw2) { alert('Passwords do not match.'); return; }

  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) { alert('Error: ' + error.message); return; }
  alert('Password changed successfully.');
}
</script>
</body>
</html>
